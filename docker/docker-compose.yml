services:
  db:
    image: postgres:16
    container_name: explicaaso_db
    restart: always
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: explicaaso_app
    restart: always
    depends_on:
      - db
    env_file:
      - ../.env
    volumes:
      - ../:/app
    ports:
      - "8000:8000"

volumes:
  postgres_data:
